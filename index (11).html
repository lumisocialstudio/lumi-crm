<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lumi Social Studio — Operations</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />

<!-- Tailwind -->

  tailwind = { config: {
    theme: {
      extend: {
        colors: {
          cream: '#fafaf8',
          offwhite: '#f4f2ee',
          ink: '#1a1814',
          dark: '#2c2a26',
          mid: '#7a7670',
          light: '#c8c4bc',
          sand: '#c4a882',
          sage: '#9caf95',
          rose: '#cf8d8d'
        },
        fontFamily: {
          serif: ['Cormorant Garamond', 'serif'],
          sans: ['Jost', 'sans-serif']
        }
      }
    }
  }}
</script>
<script src="https://cdn.tailwindcss.com"></script>

<!-- React -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  body { font-family: 'Jost', sans-serif; background: #fafaf8; }
  .font-serif { font-family: 'Cormorant Garamond', serif; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #c8c4bc; border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  *:focus-visible { outline: 2px solid #1a1814; outline-offset: 2px; }
</style>
</head>
<body class="text-ink">

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ============================================
   ICONS — minimal line icons, 24x24
============================================ */
const Icon = ({ d, className = "w-5 h-5" }) => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"
    strokeLinecap="round" strokeLinejoin="round" className={className}>
    <path d={d} />
  </svg>
);
const ICONS = {
  pipeline: "M4 5h4v14H4zM10 5h4v9h-4zM16 5h4v6h-4z",
  invoices: "M6 3h12a1 1 0 0 1 1 1v17l-3-2-3 2-3-2-3 2-3-2-1.5 1V4a1 1 0 0 1 1-1zM8 8h8M8 12h8M8 16h5",
  assets: "M3 7a2 2 0 0 1 2-2h3l2 2h9a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z",
  calendar: "M7 2v3M17 2v3M3.5 9h17M5 4h14a1.5 1.5 0 0 1 1.5 1.5v14A1.5 1.5 0 0 1 19 21H5a1.5 1.5 0 0 1-1.5-1.5v-14A1.5 1.5 0 0 1 5 4z",
  action: "M12 3 2 20h20L12 3zM12 10v4M12 17h.01",
  external: "M14 4h6v6M20 4 10 14M5 7v11a1 1 0 0 0 1 1h11",
  copy: "M9 9V4.5A1.5 1.5 0 0 1 10.5 3h8A1.5 1.5 0 0 1 20 4.5v8A1.5 1.5 0 0 1 18.5 14H14M5.5 9h8A1.5 1.5 0 0 1 15 10.5v8A1.5 1.5 0 0 1 13.5 20h-8A1.5 1.5 0 0 1 4 18.5v-8A1.5 1.5 0 0 1 5.5 9z",
  check: "M4 12l5 5L20 6",
  chevronLeft: "M15 5l-7 7 7 7",
  chevronRight: "M9 5l7 7-7 7"
};

/* ============================================
   BADGES
============================================ */
const STATUS_STYLES = {
  Sent:       "bg-offwhite text-mid border border-light",
  Replied:    "bg-sand/15 text-[#8a6f49] border border-sand/40",
  Bounced:    "bg-rose/15 text-[#a14d4d] border border-rose/40",
  "Closed/Won": "bg-sage/20 text-[#5e7256] border border-sage/40",
  Draft:      "bg-offwhite text-mid border border-light",
  Paid:       "bg-sage/20 text-[#5e7256] border border-sage/40",
  Overdue:    "bg-rose/15 text-[#a14d4d] border border-rose/40",
  Drafting:   "bg-offwhite text-mid border border-light",
  "Sent for Review": "bg-sand/15 text-[#8a6f49] border border-sand/40",
  Approved:   "bg-sage/20 text-[#5e7256] border border-sage/40"
};
const Badge = ({ status }) => (
  <span className={`text-[0.62rem] uppercase tracking-[0.15em] px-2.5 py-1 rounded-full ${STATUS_STYLES[status] || "bg-offwhite text-mid border border-light"}`}>
    {status}
  </span>
);

/* ============================================
   SIDEBAR
============================================ */
const NAV_ITEMS = [
  { key: "pipeline", label: "Pipeline", icon: ICONS.pipeline },
  { key: "invoices", label: "Invoices & Revenue", icon: ICONS.invoices },
  { key: "assets", label: "Asset Tracker", icon: ICONS.assets },
  { key: "calendar", label: "Content Calendar", icon: ICONS.calendar },
  { key: "action", label: "Action Required", icon: ICONS.action }
];

function Sidebar({ active, setActive, actionCount }) {
  return (
    <aside className="w-full md:w-64 flex-shrink-0 bg-ink text-cream md:min-h-screen md:sticky md:top-0">
      <div className="px-6 py-8">
        <p className="font-serif italic text-2xl leading-none">lumi</p>
        <p className="font-serif text-2xl leading-tight -mt-1">social studio.</p>
        <p className="mt-3 text-[0.6rem] uppercase tracking-[0.3em] text-cream/40">Operations</p>
      </div>
      <nav className="px-3 pb-8 flex flex-row md:flex-col gap-1 overflow-x-auto md:overflow-visible">
        {NAV_ITEMS.map(item => (
          <button
            key={item.key}
            onClick={() => setActive(item.key)}
            className={`flex items-center gap-3 px-3 py-3 rounded-md text-left text-sm whitespace-nowrap transition-colors
              ${active === item.key ? "bg-cream/10 text-cream" : "text-cream/50 hover:text-cream hover:bg-cream/5"}`}
          >
            <Icon d={item.icon} className="w-4 h-4 flex-shrink-0" />
            <span className="tracking-wide">{item.label}</span>
            {item.key === "action" && actionCount > 0 && (
              <span className="ml-auto bg-rose text-cream text-[0.6rem] rounded-full px-1.5 py-0.5 leading-none">
                {actionCount}
              </span>
            )}
          </button>
        ))}
      </nav>
      <div className="px-6 py-6 border-t border-cream/10 hidden md:block">
        <p className="text-[0.6rem] uppercase tracking-[0.25em] text-cream/30">Data source</p>
        <p className="text-xs text-cream/50 mt-1">crm-data.json</p>
      </div>
    </aside>
  );
}

/* ============================================
   VIEW HEADER
============================================ */
const ViewHeader = ({ eyebrow, title, sub }) => (
  <div className="mb-8">
    <p className="text-[0.62rem] uppercase tracking-[0.3em] text-sand mb-1">{eyebrow}</p>
    <h1 className="font-serif text-3xl md:text-4xl font-light">{title}</h1>
    {sub && <p className="text-sm text-mid mt-2 max-w-xl">{sub}</p>}
  </div>
);

/* ============================================
   1. PIPELINE BOARD
============================================ */
const PIPELINE_COLUMNS = [
  { key: "sent", title: "Sent", accent: "border-t-light" },
  { key: "replied", title: "Replied", accent: "border-t-sand" },
  { key: "bounced", title: "Bounced", accent: "border-t-rose" },
  { key: "closedWon", title: "Closed / Won", accent: "border-t-sage" }
];

function PipelineCard({ item }) {
  return (
    <div className="bg-white border border-offwhite rounded-lg p-4 shadow-sm hover:shadow-md transition-shadow">
      <p className="font-serif text-lg leading-tight">{item.brand}</p>
      <p className="text-xs text-mid mt-1 truncate">{item.contact}</p>
      <p className="text-[0.65rem] uppercase tracking-[0.15em] text-light mt-2">
        {item.date}{item.lastReply ? ` · replied ${item.lastReply}` : ""}
      </p>
      {item.notes && <p className="text-xs text-dark/70 mt-2 leading-relaxed">{item.notes}</p>}
    </div>
  );
}

function PipelineBoard({ data }) {
  return (
    <div>
      <ViewHeader
        eyebrow="Pipeline Board"
        title="Brand outreach"
        sub="Every brand currently in motion, grouped by where the conversation stands."
      />
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        {PIPELINE_COLUMNS.map(col => {
          const items = data.pipeline[col.key] || [];
          return (
            <div key={col.key} className={`bg-offwhite/60 rounded-xl border-t-2 ${col.accent} p-3`}>
              <div className="flex items-center justify-between mb-3 px-1">
                <p className="text-[0.65rem] uppercase tracking-[0.25em] text-mid">{col.title}</p>
                <span className="text-xs font-serif text-dark bg-white rounded-full w-6 h-6 flex items-center justify-center">
                  {items.length}
                </span>
              </div>
              <div className="flex flex-col gap-2.5 max-h-[70vh] overflow-y-auto pr-1">
                {items.length === 0 && (
                  <p className="text-xs text-light italic px-2 py-4">Nothing here yet.</p>
                )}
                {items.map(item => <PipelineCard key={item.id} item={item} />)}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================
   2. INVOICES & REVENUE LEDGER
============================================ */
function SummaryCard({ label, value, accent }) {
  return (
    <div className="bg-white border border-offwhite rounded-xl p-6 flex-1">
      <p className="text-[0.62rem] uppercase tracking-[0.25em] text-mid mb-2">{label}</p>
      <p className={`font-serif text-3xl ${accent || "text-ink"}`}>${value.toLocaleString()}</p>
    </div>
  );
}

function InvoicesLedger({ data }) {
  const invoices = data.invoices || [];
  const today = new Date();

  const totals = useMemo(() => {
    let paid = 0, pending = 0, overdue = 0;
    invoices.forEach(inv => {
      if (inv.status === "Paid") { paid += inv.amount; return; }
      const due = new Date(inv.dueDate);
      if (due < today) overdue += inv.amount;
      else pending += inv.amount;
    });
    return { paid, pending, overdue };
  }, [invoices]);

  const displayStatus = (inv) => {
    if (inv.status === "Paid") return "Paid";
    const due = new Date(inv.dueDate);
    if (due < today) return "Overdue";
    return inv.status;
  };

  return (
    <div>
      <ViewHeader
        eyebrow="Invoices & Revenue"
        title="Revenue ledger"
        sub="Every invoice across the studio, with live totals for what's been paid and what's still outstanding."
      />

      <div className="flex flex-col sm:flex-row gap-4 mb-8">
        <SummaryCard label="Paid" value={totals.paid} accent="text-[#5e7256]" />
        <SummaryCard label="Pending" value={totals.pending} accent="text-[#8a6f49]" />
        <SummaryCard label="Overdue" value={totals.overdue} accent="text-[#a14d4d]" />
      </div>

      <div className="bg-white border border-offwhite rounded-xl overflow-hidden overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="text-left text-[0.62rem] uppercase tracking-[0.2em] text-mid border-b border-offwhite">
              <th className="px-5 py-3 font-normal">Invoice</th>
              <th className="px-5 py-3 font-normal">Client</th>
              <th className="px-5 py-3 font-normal">Package</th>
              <th className="px-5 py-3 font-normal">Amount</th>
              <th className="px-5 py-3 font-normal">Due Date</th>
              <th className="px-5 py-3 font-normal">Status</th>
            </tr>
          </thead>
          <tbody>
            {invoices.map(inv => (
              <tr key={inv.id} className="border-b border-offwhite last:border-0 hover:bg-offwhite/40">
                <td className="px-5 py-3 font-serif text-base whitespace-nowrap">{inv.id}</td>
                <td className="px-5 py-3 whitespace-nowrap">{inv.client}</td>
                <td className="px-5 py-3 text-mid whitespace-nowrap">{inv.package}</td>
                <td className="px-5 py-3 font-serif whitespace-nowrap">${inv.amount.toLocaleString()}</td>
                <td className="px-5 py-3 text-mid whitespace-nowrap">{inv.dueDate}</td>
                <td className="px-5 py-3 whitespace-nowrap"><Badge status={displayStatus(inv)} /></td>
              </tr>
            ))}
            {invoices.length === 0 && (
              <tr><td colSpan="6" className="px-5 py-8 text-center text-light italic">No invoices yet.</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ============================================
   3. ASSET & DELIVERABLE TRACKER
============================================ */
function AssetTracker({ data }) {
  const assets = data.assets || [];
  return (
    <div>
      <ViewHeader
        eyebrow="Asset Tracker"
        title="Deliverables"
        sub="Every content asset in production — what's due, where it lives, and how close it is to approval."
      />
      <div className="bg-white border border-offwhite rounded-xl overflow-hidden overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="text-left text-[0.62rem] uppercase tracking-[0.2em] text-mid border-b border-offwhite">
              <th className="px-5 py-3 font-normal">Asset</th>
              <th className="px-5 py-3 font-normal">Brand</th>
              <th className="px-5 py-3 font-normal">Due Date</th>
              <th className="px-5 py-3 font-normal">Drive Link</th>
              <th className="px-5 py-3 font-normal">Status</th>
            </tr>
          </thead>
          <tbody>
            {assets.map(asset => (
              <tr key={asset.id} className="border-b border-offwhite last:border-0 hover:bg-offwhite/40">
                <td className="px-5 py-3 font-serif text-base">{asset.name}</td>
                <td className="px-5 py-3 text-mid whitespace-nowrap">{asset.brand}</td>
                <td className="px-5 py-3 text-mid whitespace-nowrap">{asset.dueDate}</td>
                <td className="px-5 py-3 whitespace-nowrap">
                  {asset.driveLink ? (
                    <a href={asset.driveLink} target="_blank" rel="noreferrer"
                      className="inline-flex items-center gap-1.5 text-xs text-ink underline decoration-light hover:decoration-ink">
                      Open <Icon d={ICONS.external} className="w-3.5 h-3.5" />
                    </a>
                  ) : (
                    <span className="text-xs text-light italic">Add link in JSON</span>
                  )}
                </td>
                <td className="px-5 py-3 whitespace-nowrap"><Badge status={asset.status} /></td>
              </tr>
            ))}
            {assets.length === 0 && (
              <tr><td colSpan="5" className="px-5 py-8 text-center text-light italic">No assets yet.</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ============================================
   4. BRAND CONTENT CALENDAR
============================================ */
const EVENT_STYLES = {
  outreach: "bg-light/40 text-dark",
  followup: "bg-sand/25 text-[#8a6f49]",
  shoot: "bg-sage/25 text-[#5e7256]",
  deadline: "bg-rose/25 text-[#a14d4d]",
  invoice: "bg-ink/10 text-ink"
};
const EVENT_LEGEND = [
  { type: "outreach", label: "Outreach" },
  { type: "followup", label: "Follow-up" },
  { type: "shoot", label: "Shoot day" },
  { type: "deadline", label: "Deadline" },
  { type: "invoice", label: "Invoice due" }
];

function ContentCalendar({ data }) {
  const [cursor, setCursor] = useState(() => {
    const events = data.calendarEvents || [];
    if (events.length) {
      const d = new Date(events[0].date);
      return new Date(d.getFullYear(), d.getMonth(), 1);
    }
    const now = new Date();
    return new Date(now.getFullYear(), now.getMonth(), 1);
  });

  const eventsByDate = useMemo(() => {
    const map = {};
    (data.calendarEvents || []).forEach(ev => {
      (map[ev.date] = map[ev.date] || []).push(ev);
    });
    return map;
  }, [data]);

  const year = cursor.getFullYear();
  const month = cursor.getMonth();
  const firstDay = new Date(year, month, 1);
  const startOffset = firstDay.getDay(); // 0 = Sunday
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthLabel = cursor.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const fmt = (d) => {
    const mm = String(month + 1).padStart(2, '0');
    const dd = String(d).padStart(2, '0');
    return `${year}-${mm}-${dd}`;
  };

  const changeMonth = (delta) => setCursor(new Date(year, month + delta, 1));

  return (
    <div>
      <ViewHeader
        eyebrow="Content Calendar"
        title="Shoots & deadlines"
        sub="A month-at-a-glance view of outreach waves, shoot days, content deadlines and invoice due dates."
      />

      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div className="flex items-center gap-2">
          <button onClick={() => changeMonth(-1)} className="p-2 rounded-md border border-offwhite hover:bg-offwhite">
            <Icon d={ICONS.chevronLeft} className="w-4 h-4" />
          </button>
          <button onClick={() => changeMonth(1)} className="p-2 rounded-md border border-offwhite hover:bg-offwhite">
            <Icon d={ICONS.chevronRight} className="w-4 h-4" />
          </button>
          <p className="font-serif text-xl ml-2">{monthLabel}</p>
        </div>
        <div className="hidden md:flex items-center gap-3 flex-wrap">
          {EVENT_LEGEND.map(l => (
            <span key={l.type} className="flex items-center gap-1.5 text-[0.65rem] uppercase tracking-[0.1em] text-mid">
              <span className={`w-2.5 h-2.5 rounded-full ${EVENT_STYLES[l.type].split(' ')[0]}`}></span>
              {l.label}
            </span>
          ))}
        </div>
      </div>

      <div className="bg-white border border-offwhite rounded-xl overflow-hidden">
        <div className="grid grid-cols-7 border-b border-offwhite">
          {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => (
            <div key={d} className="px-2 py-2 text-[0.6rem] uppercase tracking-[0.2em] text-mid text-center">{d}</div>
          ))}
        </div>
        <div className="grid grid-cols-7">
          {cells.map((d, idx) => {
            const dateStr = d ? fmt(d) : null;
            const events = dateStr ? (eventsByDate[dateStr] || []) : [];
            return (
              <div key={idx} className={`min-h-[6.5rem] border-b border-r border-offwhite p-2 ${d ? "" : "bg-offwhite/30"}`}>
                {d && <p className="text-xs font-serif text-mid mb-1">{d}</p>}
                <div className="flex flex-col gap-1">
                  {events.map((ev, i) => (
                    <span key={i} className={`text-[0.6rem] leading-tight px-1.5 py-1 rounded ${EVENT_STYLES[ev.type] || "bg-offwhite text-mid"}`}>
                      {ev.label}
                    </span>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="md:hidden flex items-center gap-3 flex-wrap mt-4">
        {EVENT_LEGEND.map(l => (
          <span key={l.type} className="flex items-center gap-1.5 text-[0.65rem] uppercase tracking-[0.1em] text-mid">
            <span className={`w-2.5 h-2.5 rounded-full ${EVENT_STYLES[l.type].split(' ')[0]}`}></span>
            {l.label}
          </span>
        ))}
      </div>
    </div>
  );
}

/* ============================================
   5. ACTION REQUIRED ZONE
============================================ */
function ActionCard({ item }) {
  const [copied, setCopied] = useState(false);
  const handleCopy = () => {
    navigator.clipboard.writeText(item.dmPitch).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <div className="bg-white border border-rose/30 rounded-xl p-5">
      <div className="flex items-start justify-between gap-4 flex-wrap">
        <div>
          <p className="font-serif text-xl">{item.brand}</p>
          <p className="text-xs text-mid mt-1">
            Email bounced: <span className="line-through text-light">{item.bouncedEmail}</span>
          </p>
          <p className="text-xs text-dark mt-1">Try Instagram instead: <span className="font-medium">{item.instagram}</span></p>
        </div>
        <button
          onClick={handleCopy}
          className={`flex items-center gap-2 text-[0.65rem] uppercase tracking-[0.18em] px-4 py-2 rounded-md transition-colors flex-shrink-0
            ${copied ? "bg-sage/25 text-[#5e7256]" : "bg-ink text-cream hover:bg-dark"}`}
        >
          <Icon d={copied ? ICONS.check : ICONS.copy} className="w-3.5 h-3.5" />
          {copied ? "Copied" : "Copy IG DM"}
        </button>
      </div>
      <p className="text-xs text-mid mt-3 leading-relaxed bg-offwhite/60 rounded-md p-3">{item.dmPitch}</p>
    </div>
  );
}

function ActionRequired({ data }) {
  const items = data.actionRequired || [];
  return (
    <div>
      <ViewHeader
        eyebrow="Action Required"
        title="Bounced outreach"
        sub="These emails didn't land. Each one has a ready-to-go Instagram DM as a backup channel — copy and send."
      />
      <div className="flex flex-col gap-4">
        {items.map(item => <ActionCard key={item.id} item={item} />)}
        {items.length === 0 && (
          <div className="bg-white border border-offwhite rounded-xl p-8 text-center">
            <p className="text-light italic">Nothing needs attention right now.</p>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================
   APP
============================================ */
function App() {
  const [data, setData] = useState(null);
  const [active, setActive] = useState("pipeline");
  const [error, setError] = useState(null);

  useEffect(() => {
    fetch('./crm-data.json')
      .then(res => {
        if (!res.ok) throw new Error('Could not load crm-data.json');
        return res.json();
      })
      .then(setData)
      .catch(err => setError(err.message));
  }, []);

  if (error) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-cream px-6 text-center">
        <div>
          <p className="font-serif text-2xl mb-2">Couldn't load your data</p>
          <p className="text-sm text-mid">{error}</p>
          <p className="text-xs text-light mt-2">Make sure crm-data.json sits in the same folder as this file.</p>
        </div>
      </div>
    );
  }

  if (!data) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-cream">
        <p className="font-serif text-xl text-mid">Loading studio data...</p>
      </div>
    );
  }

  const actionCount = (data.actionRequired || []).length;

  const VIEWS = {
    pipeline: <PipelineBoard data={data} />,
    invoices: <InvoicesLedger data={data} />,
    assets: <AssetTracker data={data} />,
    calendar: <ContentCalendar data={data} />,
    action: <ActionRequired data={data} />
  };

  return (
    <div className="flex flex-col md:flex-row bg-cream min-h-screen">
      <Sidebar active={active} setActive={setActive} actionCount={actionCount} />
      <main className="flex-1 p-6 md:p-10">
        {VIEWS[active]}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
